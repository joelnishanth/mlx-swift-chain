name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Swift package describe
        run: swift package describe

      - name: Swift build
        run: swift build

      - name: Swift test
        run: swift test
